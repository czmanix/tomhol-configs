<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoWatch Uploader</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2a2a2a; --text: #eee; --accent: #00a86b; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.2rem; margin: 15px 0; text-align: center; }
        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; color: #aaa; }
        input[type="file"], button { width: 100%; padding: 10px; margin-top: 5px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; padding: 12px; background: var(--accent); }
        button:active { background: #007a50; }
        #status { text-align: center; margin-top: 15px; color: #aaa; overflow-wrap: break-word; }
        #status a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Uploader</h1>
        <div class="panel">
            <form action="https://freeimage.host/api/1/upload" method="POST" enctype="multipart/form-data">
                <label for="fileInput">1. Select an image:</label>
                <input type="file" id="fileInput" name="source" accept="image/*" required>
                <input type="hidden" name="action" value="upload">
                <input type="hidden" name="key" value="6d207e02198a847aa98d0a2a901485a5">
                <!-- Return plain text URL after upload -->
                <input type="hidden" name="format" value="txt">
                <button type="submit" id="uploadBtn" style="margin-top: 15px;">2. Upload Image</button>
            </form>
            <div id="status" style="margin-top: 15px;">
                <p><b>Important:</b> After clicking "Upload Image", you will be taken to a new page with just the image URL.</p>
                <p>Copy this URL and paste it into the main configuration window.</p>
            </div>
        </div>
    </div>
</body>
</html>
