<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoWatch Uploader</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2a2a2a; --text: #eee; --accent: #00a86b; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.2rem; margin: 15px 0; text-align: center; }
        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; color: #aaa; }
        input[type="file"], button { width: 100%; padding: 10px; margin-top: 5px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; padding: 12px; background: var(--accent); }
        button:active { background: #007a50; }
        #status { text-align: center; margin-top: 15px; color: #aaa; overflow-wrap: break-word; }
        #status a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Uploader</h1>
        <div class="panel">
            <label for="fileInput">1. Select an image:</label>
            <input type="file" id="fileInput" accept="image/*">
            <button id="uploadBtn" style="margin-top: 15px;">2. Get temporary URL</button>
            <p id="status">This page will upload the image to ImgBB and generate a temporary link (valid for 10 minutes) that you can paste into the configurator.</p>
        </div>
    </div>

    <script>
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const statusText = document.getElementById('status');

            // Kontrola, zda uživatel vybral soubor
            if (fileInput.files.length === 0) {
                statusText.textContent = "Please select an image file first.";
                return;
            }

            // Příprava dat pro odeslání (simuluje běžný HTML formulář)
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            statusText.textContent = "Uploading...";

            try {
                // Volání API (nahraď TVUJ_API_KLIC svým klíčem z api.imgbb.com)
                const response = await fetch("https://api.imgbb.com/1/upload?expiration=600&key=d652bb08cee901998f4c904b7e259f3a", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                // Zpracování odpovědi
                if (data.success) {
                    const imgUrl = data.data.url;
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(imgUrl).then(() => {
                            // Úspěšně zkopírováno
                            statusText.innerHTML = `URL copied to clipboard! Paste it into the main configuration window:<br><a href="${imgUrl}" target="_blank">${imgUrl}</a>`;
                        }).catch(err => {
                            // Chyba při kopírování (např. zamítnutí oprávnění)
                            console.error('Could not copy text: ', err);
                            statusText.innerHTML = `Done! Copy the link and paste it into the main configuration window:<br><a href="${imgUrl}" target="_blank">${imgUrl}</a>`;
                        });
                    } else {
                        // Fallback pro starší prohlížeče, které nepodporují Clipboard API
                        statusText.innerHTML = `Done! Copy the link and paste it into the main configuration window:<br><a href="${imgUrl}" target="_blank">${imgUrl}</a>`;
                    }
                } else {
                    statusText.textContent = "Upload failed. Error: " + (data.error?.message || 'Unknown error');
                }
            } catch (error) {
                statusText.textContent = "A connection error occurred with the upload service.";
            }
        });
    </script>
</body>
</html>
