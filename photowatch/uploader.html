<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Nahrávání obrázku</title>
</head>
<body>

    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn">Získat URL</button>
    
    <p id="status"></p>

    <script>
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const statusText = document.getElementById('status');

            // Kontrola, zda uživatel vybral soubor
            if (fileInput.files.length === 0) {
                statusText.textContent = "Nejdřív vyber obrázek.";
                return;
            }

            // Příprava dat pro odeslání (simuluje běžný HTML formulář)
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            statusText.textContent = "Nahrávám...";

            try {
                // Volání API (nahraď TVUJ_API_KLIC svým klíčem z api.imgbb.com)
                const response = await fetch("https://api.imgbb.com/1/upload?expiration=600&key=d652bb08cee901998f4c904b7e259f3a", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                // Zpracování odpovědi
                if (data.success) {
                    const imgUrl = data.data.url;
                    statusText.innerHTML = `Hotovo! Tady je odkaz: <a href="${imgUrl}" target="_blank">${imgUrl}</a>`;
                } else {
                    statusText.textContent = "Nahrávání selhalo. Zkontroluj API klíč.";
                }
            } catch (error) {
                statusText.textContent = "Došlo k chybě připojení.";
            }
        });
    </script>
</body>
</html>
