<!DOCTYPE html>
<html>
<head>
  <title>Photowatch Configuration</title>
  <style>
    body { font-family: sans-serif; padding: 10px; max-width: 400px; margin: 0 auto; }
    #status { margin-top: 10px; }
    button { padding: 10px; font-size: 1em; width: 100%; }
    input[type="text"] { width: calc(100% - 22px); padding: 10px; margin: 10px 0; }
    #paste-area {
      border: 2px dashed #ccc;
      padding: 20px;
      text-align: center;
      color: #777;
      border-radius: 5px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h1>Photowatch Settings</h1>
  <p>On your phone, copy an image and then paste it into the box below.</p>
  
  <div id="paste-area" contenteditable="true">Tap here and paste</div>

  <p style="text-align:center; margin-top: 15px;">- or -</p>
  <p>Paste a direct image URL:</p>
  <input type="text" id="image-url" placeholder="https://i.imgur.com/your-image.png">
  
  <div id="status"></div>
  
  <button id="save-button">Save</button>

  <script>
    const pasteArea = document.getElementById('paste-area');
    const imageUrlInput = document.getElementById('image-url');
    const saveButton = document.getElementById('save-button');
    const statusEl = document.getElementById('status');
    let imageDataUrl = null;

    pasteArea.addEventListener('paste', (e) => {
      // Stop the browser from inserting the pasted content into the div
      e.preventDefault();

      // Get the data from the clipboard
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      let foundImage = false;

      for (const item of items) {
        // Check if the item is an image
        if (item.type.indexOf('image') !== -1) {
          const blob = item.getAsFile();
          const reader = new FileReader();
          
          reader.onload = (event) => {
            imageDataUrl = event.target.result;
            statusEl.textContent = 'Image pasted! Ready to save.';
            pasteArea.textContent = 'Image Received!';
            pasteArea.style.borderColor = '#4CAF50'; // Green border
          };
          reader.onerror = (err) => {
            statusEl.textContent = 'Error reading pasted image: ' + err;
          };
          reader.readAsDataURL(blob);
          foundImage = true;
          break; // We only need the first image
        }
      }

      if (!foundImage) {
        statusEl.textContent = 'No image found in clipboard.';
      }
    });

    imageUrlInput.addEventListener('input', (e) => {
      imageDataUrl = e.target.value;
      statusEl.textContent = 'Image URL entered. Ready to save.';
    });

    saveButton.addEventListener('click', () => {
      if (!imageDataUrl) {
        alert('Please paste an image or an image URL first!');
        return;
      }

      statusEl.textContent = 'Saving...';
      // Create a dictionary of settings to return
      const settings = {
        'image': imageDataUrl
      };

      // Return to the Pebble app
      const returnUrl = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(settings));
      document.location.href = returnUrl;
    });
  </script>
</body>
</html>
