<!DOCTYPE html>
<html>
<head>
  <title>Photowatch Configuration</title>
  <style>
    body { font-family: sans-serif; padding: 10px; max-width: 400px; margin: 0 auto; }
    #status { margin-top: 10px; }
    button { padding: 10px; font-size: 1em; width: 100%; }
    input[type="text"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; }
    .option { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    .option-title { font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h1>Photowatch Settings</h1>
  <p>Select a background image for your watchface.</p>
  
  <div class="option">
    <div class="option-title">Option 1: Paste Image URL</div>
    <p>On mobile, upload your image to a service like <a href="https://imgur.com/upload" target="_blank">Imgur</a>, get the direct image link (e.g., ending in .jpg or .png), and paste it here.</p>
    <input type="text" id="image-url" placeholder="https://i.imgur.com/your-image.png">
  </div>

  <div class="option">
    <div class="option-title">Option 2: Upload File (Desktop Only)</div>
    <input type="file" id="image-picker" accept="image/*">
  </div>
  
  <div id="status"></div>
  
  <button id="save-button">Save</button>

  <script>
    const imagePicker = document.getElementById('image-picker');
    const imageUrlInput = document.getElementById('image-url');
    const saveButton = document.getElementById('save-button');
    const statusEl = document.getElementById('status');
    let imageDataUrl = null;

    imagePicker.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) {
        return;
      }
      
      // Use FileReader to read the file as a Data URL
      const reader = new FileReader();
      reader.onload = (event) => {
        imageDataUrl = event.target.result;
        statusEl.textContent = 'Image selected. Ready to save.';
      };
      reader.onerror = (err) => {
        statusEl.textContent = 'Error reading file: ' + err;
      };
      reader.readAsDataURL(file);
    });

    imageUrlInput.addEventListener('input', (e) => {
      // When the user pastes a URL, we'll use that directly.
      // The JS code in index.js can handle both data URLs and regular URLs.
      imageDataUrl = e.target.value;
      statusEl.textContent = 'Image URL entered. Ready to save.';
    });

    saveButton.addEventListener('click', () => {
      if (!imageDataUrl) {
        alert('Please select an image or paste an image URL first!');
        return;
      }

      statusEl.textContent = 'Saving...';
      // Create a dictionary of settings to return
      const settings = {
        'image': imageDataUrl
      };

      // Return to the Pebble app
      const returnUrl = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(settings));
      document.location.href = returnUrl;
    });
  </script>
</body>
</html>
